name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: packages/**/dist
          key: build-${{ hashFiles('packages/**/src/**', 'packages/**/tsconfig.json') }}
          restore-keys: build-
      - run: npm ci
      - run: npm run check:lockfile
      - run: npm run check:peer-deps
      # Guard the SEC3 security gates below from silent removal/weakening (e.g.
      # the audit level relaxed under `moderate`, or the secret scan dropped).
      - run: npm run check:security-workflow
      # Guard against HTML-entity contamination creeping back into locale data.
      - run: node scripts/decode-locale-entities.js --check
      # Every app feature package must carry a module-level @example so its
      # auto-generated MOLECULE.md shows the AI executor how to use the component.
      - run: npm run check:feature-jsdocs
      # i18n parity (cross-cutting-i18n): a literal `t('ns.key')` whose namespace
      # is owned by a single locale bond must exist in that bond's en.ts — else
      # English speakers see the inline defaultValue but every other locale is
      # stuck on English for that surface. Fails ONLY on NEW gaps vs the
      # scripts/i18n-parity-baseline.json debt list, so the historical backlog is
      # paid down without turning the gate red today.
      - run: npm run check:i18n-parity
      - run: npm run build
      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  # Security scanning (SEC3) — the core @molecule/* library publishes to npm, so
  # it must carry the same secure-by-default gates mlcl ships in its own CI and
  # scaffolds into every generated project. Two independent gates:
  #   - npm audit  — fails on a moderate-or-higher dependency advisory
  #   - gitleaks   — fails if a credential is committed to the working tree
  #
  # USER ACTION (platform toggle — cannot be set from a workflow): also enable
  # GitHub-native secret scanning + push protection in the repo's
  # Settings → Code security and analysis. That blocks a known secret pattern at
  # `git push` time (before it ever lands), complementing the post-checkout
  # gitleaks scan below. https://docs.github.com/code-security/secret-scanning
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Fail on a moderate-or-higher dependency advisory. Mirrors mlcl's gate —
      # do NOT relax below `moderate` to dodge findings (that hides real debt).
      - run: npm audit --audit-level=moderate
      # Working-tree secret scan via gitleaks (Docker on the runner — no
      # marketplace-action license needed). `--no-git` catches a leaked
      # credential in an open PR before it is merged.
      - name: Scan for committed secrets (gitleaks)
        run: >-
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest
          detect --source=/repo --no-git --redact --verbose
